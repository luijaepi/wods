<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WODS 3.0">
<meta name="theme-color" content="#090909">
<title>WODS 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090909;
  --s1: #111;
  --s2: #181818;
  --s3: #202020;
  --border: #242424;
  --text: #f0f0f0;
  --muted: #4a4a4a;
  --muted2: #777;
  --mar: #e8ff47;
  --mie: #ff4560;
  --jue: #00e5c4;
  --vie: #b97cff;
  --mov: #ff9f47;
  /* iPhone 14 Pro: Dynamic Island safe-area-inset-top ≈ 59px, home indicator ≈ 34px */
  --sit: env(safe-area-inset-top, 0px);
  --sib: env(safe-area-inset-bottom, 0px);
  --sil: env(safe-area-inset-left, 0px);
  --sir: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html {
  background: var(--bg);
  /* Ensures background fills behind Dynamic Island */
  background-attachment: fixed;
}
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  /* Use dvh for dynamic viewport — handles iOS Safari toolbar show/hide */
  min-height: 100dvh;
  overscroll-behavior: none;
  /* Prevent text size adjustment on rotation */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  /* Dynamic Island: padding-top must use safe-area-inset-top */
  padding-top: var(--sit);
  border-bottom: 1px solid var(--border);
  /* Extend background behind Dynamic Island notch area */
  margin-top: calc(-1 * var(--sit));
  padding-top: calc(var(--sit) + 0px);
}
.hdr-inner { padding: 8px 18px 0; }
.hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}
.logo span { opacity: 0.3; }
.logo-sub {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: 1px;
}
.hdr-right {
  display: flex;
  gap: 6px;
}
.nav-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  min-height: 32px;
  padding: 0 11px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.nav-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ── TABS ── */
.tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: 0;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  min-height: 38px;
  padding: 0 2px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; animation: up 0.18s ease both; }
@keyframes up { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

/* ── PAGE PADDING ── */
/* Timer bar ~120px + home indicator ~34pt + breathing room */
.page { padding: 0 18px 150px; }
.log-page { padding: 0 18px 150px; }

/* ── DAY HERO ── */
.hero {
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
}
.hero-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-bottom: 6px;
}
.hero-title {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 0.92;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
}
.hero-sub {
  font-size: 12px;
  color: var(--muted2);
  margin-top: 8px;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1.4;
}
.hero-tags {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.htag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid currentColor;
  /* min touch-friendly height even if small text */
  min-height: 28px;
  display: flex;
  align-items: center;
}

/* ── SECTION LABEL ── */
.sl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.22em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 20px 0 11px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── COLLAPSIBLE ── */
.coll {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.coll-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
}
.coll-lbl {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.coll-ico { color: var(--muted2); font-size: 18px; transition: transform 0.2s; line-height: 1; }
.coll-ico.open { transform: rotate(45deg); }
.coll-bd {
  display: none;
  border-top: 1px solid var(--border);
  padding: 6px 16px 14px;
}
.coll-bd.open { display: block; }
.ci {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.5;
  font-weight: 400;
  align-items: flex-start;
}
.ci:last-child { border-bottom: none; }
.ci-dot { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; margin-top: 7px; }

/* ── WOD CARD ── */
.wod {
  border-radius: 14px;
  border: 1px solid;
  overflow: hidden;
}
.wod-top {
  padding: 14px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.wod-fmt {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-bottom: 2px;
}
.wod-nm {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.01em;
  line-height: 1;
}
.wod-clk {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  opacity: 0.85;
}
.wod-div { height: 1px; background: rgba(255,255,255,0.07); }
.wod-moves { padding: 10px 16px; }
.wod-mv {
  display: flex;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13.5px;
  font-weight: 400;
  line-height: 1.4;
  align-items: flex-start;
}
.wod-mv:last-child { border-bottom: none; }
.wod-n {
  font-size: 10px;
  font-weight: 700;
  opacity: 0.4;
  flex-shrink: 0;
  margin-top: 3px;
  min-width: 14px;
  font-family: 'DM Mono', monospace;
}
.wod-tip {
  margin: 0 16px 14px;
  padding: 10px 13px;
  background: rgba(0,0,0,0.35);
  border-radius: 9px;
  font-size: 12px;
  font-weight: 400;
  color: var(--muted2);
  line-height: 1.6;
}
.wod-tip b { color: #ccc; font-weight: 600; }

/* ── EXERCISE CARD ── */
.ex {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px 13px 19px;
  margin-bottom: 8px;
  position: relative;
}
.ex-bar {
  position: absolute;
  left: 0; top: 10px; bottom: 10px;
  width: 3px;
  border-radius: 0 3px 3px 0;
}
.ex-r1 {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}
.ex-nm {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.2;
  flex: 1;
}
.ex-kg {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.01em;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}
.ex-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.chip {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--s3);
  color: var(--muted2);
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
}
.ex-note {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted2);
  line-height: 1.6;
}
.ex-note.warn { color: #f59e0b; }
.ex-opt-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* ── LOG VIEW ── */
.log-week {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-top: 16px;
}
.log-week-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.log-week-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.log-week-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
}
.log-day-row {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
}
.log-day-row:last-child { border-bottom: none; }
.log-day-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.log-day-name {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
}
.log-feel {
  display: flex;
  gap: 4px;
}
.feel-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--muted2);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  transition: all 0.1s;
}
.feel-btn.sel { border-color: currentColor; }
.log-checks {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.chk-btn {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.12s;
}
.chk-btn.on { background: var(--s3); }
.log-inputs {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.log-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.log-input-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted2);
  min-width: 90px;
  text-transform: uppercase;
}
.log-input {
  flex: 1;
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  outline: none;
}
.log-input:focus { border-color: var(--muted2); }
.log-textarea {
  width: 100%;
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 10px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 400;
  outline: none;
  resize: none;
  line-height: 1.5;
  min-height: 56px;
}
.log-textarea:focus { border-color: var(--muted2); }
.log-week-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.log-sleep-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex: 1;
}
.sleep-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--muted2);
  text-transform: uppercase;
  white-space: nowrap;
}
.btn-save {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: var(--text);
  color: var(--bg);
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.1s;
}
.btn-save:active { opacity: 0.8; }
.saved-weeks { margin-top: 20px; }
.saved-week-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
}
.saved-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  cursor: pointer;
}
.saved-title { font-size: 13px; font-weight: 700; }
.saved-summary {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
}
.saved-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
}
.saved-body.open { display: block; }
.saved-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 400;
}
.saved-row:last-child { border-bottom: none; }
.saved-key { color: var(--muted2); font-weight: 600; }
.saved-val { font-family: 'DM Mono', monospace; font-size: 11px; text-align: right; max-width: 60%; word-break: break-word; }
.empty-log {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.6;
}

/* ── MOVILIDAD VIEW ── */
.mov-hero {
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
}
.mov-day-tabs {
  display: flex;
  gap: 6px;
  margin-top: 14px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.mov-day-tabs::-webkit-scrollbar { display: none; }
.mov-dtab {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0 14px;
  min-height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--muted2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  display: flex;
  align-items: center;
}
.mov-dtab.active {
  background: var(--mov);
  color: #111;
  border-color: var(--mov);
}
.mov-block {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 8px;
}
.mov-block-hd {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
}
.mov-block-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mov-block-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
}
.mov-block-body {
  display: none;
  border-top: 1px solid var(--border);
}
.mov-block-body.open { display: block; }
.mov-ex {
  padding: 13px 16px 12px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.mov-ex:last-child { border-bottom: none; }
.mov-ex-bar {
  position: absolute;
  left: 0; top: 10px; bottom: 10px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: var(--mov);
}
.mov-ex-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 5px;
  line-height: 1.2;
}
.mov-ex-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 7px;
}
.mov-ex-note {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted2);
  line-height: 1.6;
}
.mov-ex-note b { color: #ccc; }
.mov-fr-tag {
  background: #ff9f4722;
  border: 1px solid #ff9f4744;
  color: var(--mov);
}
.mov-insight {
  margin: 0 18px 14px;
  padding: 12px 14px;
  background: rgba(255,159,71,0.07);
  border: 1px solid rgba(255,159,71,0.2);
  border-radius: 10px;
  font-size: 12px;
  color: var(--muted2);
  line-height: 1.65;
}
.mov-insight b { color: var(--mov); font-weight: 600; }

/* ── TIMER BAR ── */
.tbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(9,9,9,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px max(18px, var(--sil)) 0 max(18px, var(--sir));
  padding-top: 10px;
  padding-left: max(18px, var(--sil));
  padding-right: max(18px, var(--sir));
  padding-bottom: max(14px, calc(var(--sib) + 6px));
  z-index: 100;
}
.tbar-inner { display: flex; gap: 10px; align-items: center; }
.tbar-left { flex-shrink: 0; }
.tnum {
  font-family: 'DM Mono', monospace;
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
  transition: color 0.2s;
  min-width: 68px;
}
.tnum.go { color: var(--mar); }
.tnum.warn { color: var(--mie); }
.tpres { display: flex; gap: 4px; margin-top: 5px; }
.tpre {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  min-height: 30px;
  padding: 0 8px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.1s;
  display: flex;
  align-items: center;
}
.tpre:active { opacity: 0.7; transform: scale(0.95); }
.tpre.sel { background: var(--s3); color: var(--text); border-color: var(--muted2); }
.tbtns { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.tbtn {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  min-height: 36px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  width: 100%;
  transition: transform 0.08s, opacity 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tbtn:active { transform: scale(0.97); opacity: 0.85; }
.t-go   { background: var(--mar); color: #090909; }
.t-stop { background: var(--mie); color: #090909; }
.t-rst  { background: var(--s2); color: var(--muted2); border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <div class="logo">WODS<span> 3.0</span></div>
      <div class="hdr-right">
        <button class="nav-pill active" id="pill-train" onclick="switchView('train')">RUTINA</button>
        <button class="nav-pill" id="pill-mov" onclick="switchView('mov')">MOV</button>
        <button class="nav-pill" id="pill-log" onclick="switchView('log')">LOG</button>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- RUTINA VIEW -->
<div class="view active" id="view-train">
  <div class="page" id="page"></div>
</div>

<!-- MOVILIDAD VIEW -->
<div class="view" id="view-mov">
  <div class="page" id="mov-page"></div>

// ══════════════════════════════════════════════════════════════ VIEW SWITCH
function switchView(v) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-pill').forEach(el => el.classList.remove('active'));
  document.getElementById('pill-' + v).classList.add('active');
  // Show/hide day tabs
  document.getElementById('tabs').style.display = v === 'mov' ? 'none' : '';
  if (v === 'log') renderLog();
  if (v === 'mov') renderMov();
}

// ══════════════════════════════════════════════════════════════ TABS
function renderTabs() {
  document.getElementById('tabs').innerHTML = DAYS.map(d => `
    <button class="tab ${d.id===curDay.id?'active':''}"
      style="${d.id===curDay.id?`color:${d.color};border-bottom:2px solid ${d.color}`:'border-bottom:2px solid transparent'}"
      onclick="selDay('${d.id}')">
      ${d.tab}
    </button>
  `).join('');
}

function fitHeroTitle() {
  const el = document.getElementById('hero-title');
  if (!el) return;
  let size = 56;
  el.style.fontSize = size + 'px';
  const maxW = el.parentElement.clientWidth;
  while (el.scrollWidth > maxW && size > 20) {
    size -= 1;
    el.style.fontSize = size + 'px';
  }
}

function selDay(id) {
  curDay = DAYS.find(d=>d.id===id);
  renderTabs();
  renderPage();
  window.scrollTo({top:0,behavior:'instant'});
  requestAnimationFrame(fitHeroTitle);
}

// ══════════════════════════════════════════════════════════════ LOG
const LOG_KEY = 'wods3_log';

function getWeekKey() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const wn = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(wn).padStart(2,'0')}`;
}

// In-memory fallback: safe for WKWebView, private browsing, and file:// protocol
let _mem = {};
function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '{}'); }
  catch(e) { return _mem[LOG_KEY] ? JSON.parse(_mem[LOG_KEY]) : {}; }
}
function saveLog(data) {
  const s = JSON.stringify(data);
  try { localStorage.setItem(LOG_KEY, s); } catch(e) {}
  _mem[LOG_KEY] = s;
}

function renderLog() {
  const wk = getWeekKey();
  const allLog = loadLog();
  const cur = allLog[wk] || {};

  const dayRows = DAYS.map(d => {
    const dk = d.id;
    const dc = cur[dk] || {};
    const feelBtns = [1,2,3,4,5].map(n=>`
      <button class="feel-btn ${dc.feel==n?'sel':''}"
        style="${dc.feel==n?`color:${d.color};background:${d.color}22`:'color:var(--muted2)'}"
        onclick="setFeel('${wk}','${dk}',${n},this,'${d.color}')">${n}</button>`).join('');

    const checks = [
      {k:'wod', l:'WOD ✓'},
      {k:'fuerza', l:'Fuerza ✓'},
      {k:'parcial', l:'Parcial'},
      {k:'hombro_ok', l:'Hombro OK'},
    ].map(c=>`
      <button class="chk-btn ${dc[c.k]?'on':''}"
        style="${dc[c.k]?`color:${d.color};border-color:${d.color}66`:''}"
        onclick="toggleChk('${wk}','${dk}','${c.k}',this,'${d.color}')">${c.l}</button>`).join('');

    const domLabel = dk==='mar'?'Dom A (reps por serie)':dk==='jue'?'Dom C (banda)':'';
    const domInput = domLabel ? `
      <div class="log-input-row">
        <div class="log-input-lbl">${domLabel}</div>
        <input class="log-input" type="text" placeholder="ej: 4,4,3,4"
          value="${dc.dom||''}"
          oninput="setField('${wk}','${dk}','dom',this.value)">
      </div>` : '';

    return `
      <div class="log-day-row">
        <div class="log-day-hd">
          <div class="log-day-name" style="color:${d.color}">${d.tab} — ${d.eyebrow.split(' · ')[1]}</div>
          <div class="log-feel">${feelBtns}</div>
        </div>
        <div class="log-checks">${checks}</div>
        <div class="log-inputs">
          ${domInput}
          <div class="log-input-row">
            <div class="log-input-lbl">Nota</div>
            <textarea class="log-textarea" placeholder="libre..."
              oninput="setField('${wk}','${dk}','nota',this.value)">${dc.nota||''}</textarea>
          </div>
        </div>
      </div>`;
  }).join('');

  const saved = Object.entries(allLog)
    .filter(([k])=>k!==wk)
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .slice(0,8)
    .map(([k,v])=>{
      const rows = DAYS.map(d=>{
        const dd = v[d.id]||{};
        const parts = [];
        if(dd.wod) parts.push('WOD✓');
        if(dd.fuerza) parts.push('Fuerza✓');
        if(dd.parcial) parts.push('Parcial');
        if(dd.dom) parts.push(`Dom:${dd.dom}`);
        if(dd.feel) parts.push(`😤${dd.feel}`);
        return `<div class="saved-row">
          <div class="saved-key" style="color:${DAYS.find(x=>x.id===d.id)?.color}">${d.tab}</div>
          <div class="saved-val">${parts.join(' · ')||'—'}</div>
        </div>`;
      }).join('');
      const sueño = v.sueño ? `<div class="saved-row"><div class="saved-key">Sueño</div><div class="saved-val">${v.sueño}h · energía ${v.energia||'?'}</div></div>` : '';
      const nota = v.nota_semana ? `<div class="saved-row"><div class="saved-key">Nota</div><div class="saved-val">${v.nota_semana}</div></div>` : '';
      return `
        <div class="saved-week-card">
          <div class="saved-hd" onclick="togSaved('${k}')">
            <div class="saved-title">${k}</div>
            <div class="saved-summary">${Object.keys(v).length} días</div>
          </div>
          <div class="saved-body" id="saved-${k}">${rows}${sueño}${nota}</div>
        </div>`;
    }).join('');

  document.getElementById('log-page').innerHTML = `
    <div class="sl">📋 Semana actual — ${wk}</div>
    <div class="log-week">
      <div class="log-week-hd">
        <div class="log-week-title">Registro semanal</div>
        <div class="log-week-num">${wk}</div>
      </div>
      ${dayRows}
      <div class="log-week-footer">
        <div class="log-sleep-row">
          <div class="sleep-lbl">Sueño (h)</div>
          <input class="log-input" type="number" min="3" max="12" step="0.5"
            placeholder="7.5" style="max-width:70px"
            value="${cur.sueño||''}"
            oninput="setRootField('${wk}','sueño',this.value)">
          <div class="sleep-lbl">Energía</div>
          <input class="log-input" type="number" min="1" max="5"
            placeholder="3" style="max-width:55px"
            value="${cur.energia||''}"
            oninput="setRootField('${wk}','energia',this.value)">
        </div>
      </div>
      <div style="padding:0 16px 14px">
        <textarea class="log-textarea" placeholder="Nota de la semana — lo que sea..."
          oninput="setRootField('${wk}','nota_semana',this.value)">${cur.nota_semana||''}</textarea>
      </div>
    </div>

    <div class="saved-weeks">
      <div class="sl">🗂 Historial</div>
      ${saved || '<div class="empty-log">Aquí aparecerán tus semanas anteriores.<br>Empieza a registrar hoy.</div>'}
    </div>
  `;
}

function setFeel(wk, dk, n, btn, col) {
  const log = loadLog();
  if(!log[wk]) log[wk]={};
  if(!log[wk][dk]) log[wk][dk]={};
  log[wk][dk].feel = n;
  saveLog(log);
  // update UI
  btn.closest('.log-feel').querySelectorAll('.feel-btn').forEach((b,i)=>{
    const v = i+1;
    if(v===n){ b.classList.add('sel'); b.style.color=col; b.style.background=col+'22'; }
    else { b.classList.remove('sel'); b.style.color=''; b.style.background=''; }
  });
}

function toggleChk(wk, dk, field, btn, col) {
  const log = loadLog();
  if(!log[wk]) log[wk]={};
  if(!log[wk][dk]) log[wk][dk]={};
  log[wk][dk][field] = !log[wk][dk][field];
  saveLog(log);
  const on = log[wk][dk][field];
  btn.classList.toggle('on', on);
  btn.style.color = on ? col : '';
  btn.style.borderColor = on ? col+'66' : '';
}

function setField(wk, dk, field, val) {
  const log = loadLog();
  if(!log[wk]) log[wk]={};
  if(!log[wk][dk]) log[wk][dk]={};
  log[wk][dk][field] = val;
  saveLog(log);
}

function setRootField(wk, field, val) {
  const log = loadLog();
  if(!log[wk]) log[wk]={};
  log[wk][field] = val;
  saveLog(log);
}

function togSaved(k) {
  const el = document.getElementById('saved-'+k);
  el.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════ TIMER
let tSec=0,tTarget=0,tRun=false,tDown=false,tIv=null,tSelBtn=null;
function fmt(s){const m=Math.floor(Math.abs(s)/60);return `${m}:${(Math.abs(s)%60).toString().padStart(2,'0')}`;}
function updT(){
  const el=document.getElementById('tnum');
  el.textContent=fmt(tSec);
  el.classList.remove('go','warn');
  if(tRun){ el.classList.add(tDown&&tSec<=10?'warn':'go'); }
}
function tSet(s,btn){
  tReset();
  if(tSelBtn) tSelBtn.classList.remove('sel');
  tSelBtn=btn; btn.classList.add('sel');
  tTarget=s; tSec=s; tDown=true; updT();
}
function tToggle(){
  if(tRun){
    clearInterval(tIv); tRun=false;
    document.getElementById('tgo').textContent='INICIAR';
    document.getElementById('tgo').className='tbtn t-go';
    updT(); return;
  }
  tRun=true;
  document.getElementById('tgo').textContent='PAUSA';
  document.getElementById('tgo').className='tbtn t-stop';
  tIv=setInterval(()=>{
    if(tDown){ tSec--;
      if(tSec<=0){
        tSec=0; clearInterval(tIv); tRun=false;
        document.getElementById('tgo').textContent='INICIAR';
        document.getElementById('tgo').className='tbtn t-go';
        try{navigator.vibrate&&navigator.vibrate([200,100,200,100,400]);}catch(e){}
        if(tSelBtn){tSelBtn.classList.remove('sel');tSelBtn=null;}
        document.getElementById('tnum').classList.add('warn');
        return;
      }
    } else { tSec++; }
    updT();
  },1000);
}
function tReset(){
  clearInterval(tIv); tRun=false; tDown=false; tSec=0;
  document.getElementById('tgo').textContent='INICIAR';
  document.getElementById('tgo').className='tbtn t-go';
  if(tSelBtn){tSelBtn.classList.remove('sel');tSelBtn=null;}
  updT();
}

let curMovDay = MOV_DAYS[0];

function renderMov() {
  const d = curMovDay;
  const tabsHTML = MOV_DAYS.map(md=>`
    <button class="mov-dtab ${md.id===d.id?'active':''}" onclick="selMovDay('${md.id}')">${md.label}</button>
  `).join('');

  const blocksHTML = d.blocks.map((bl,bi)=>{
    const bid = 'mb'+d.id+bi;
    const exsHTML = bl.exs.map(ex=>`
      <div class="mov-ex">
        <div class="mov-ex-bar"></div>
        <div class="mov-ex-name">${ex.nm}</div>
        <div class="mov-ex-chips">
          <span class="chip">${ex.dur}</span>
          ${ex.sets!=='—'?`<span class="chip">${ex.sets}</span>`:''}
          ${ex.nm.toLowerCase().includes('foam') || ex.nm.toLowerCase().includes('fr ')?'<span class="chip mov-fr-tag">FOAM ROLLER</span>':''}
        </div>
        <div class="mov-ex-note">${ex.note}</div>
      </div>`).join('');
    return `
      <div class="mov-block">
        <div class="mov-block-hd" onclick="togMovBlock('${bid}','${bid}ico')">
          <div class="mov-block-title">${bl.emoji} ${bl.title}</div>
          <div style="display:flex;gap:10px;align-items:center">
            <div class="mov-block-meta">${bl.duration}</div>
            <div class="coll-ico" id="${bid}ico">+</div>
          </div>
        </div>
        <div class="mov-block-body" id="${bid}">${exsHTML}</div>
      </div>`;
  }).join('');

  document.getElementById('mov-page').innerHTML = `
    <div class="mov-hero">
      <div class="hero-eyebrow">Tarde · 19:00 · 15-20 min</div>
      <div class="hero-title" style="color:var(--mov)">MOVILIDAD</div>
      <div class="hero-sub">${d.focus}</div>
      <div class="mov-day-tabs">${tabsHTML}</div>
    </div>

    <div class="mov-insight">${d.insight}</div>

    ${blocksHTML}
  `;
}

function selMovDay(id) {
  curMovDay = MOV_DAYS.find(d=>d.id===id);
  renderMov();
  window.scrollTo({top:0,behavior:'instant'});
}

function togMovBlock(bodyId, icoId) {
  document.getElementById(bodyId).classList.toggle('open');
  document.getElementById(icoId).classList.toggle('open');
}
